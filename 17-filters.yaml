- name: filters
  hosts: web
  become: yes
  vars_files:
  - project.yaml

  tasks:
  - name: Print filters
    ansible.builtin.debug:
      msg: "{{ some_variable | default(5) }}"

  - name: Print fruits
    vars:
      fruits: apple,banana,orange
    ansible.builtin.debug:
      msg: "{{ fruits | split(',') }}"