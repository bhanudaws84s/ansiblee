- name: Installing nginx
  hosts: web
  become: yes
  tasks:
  - name: Install Nginx
    ansible.builtin.dnf:
      name: nginx
      state: installed

  - name: Start service httpd, if not started
    ansible.builtin.service:
      name: nginx
      enabled: yes
      state: restarted

